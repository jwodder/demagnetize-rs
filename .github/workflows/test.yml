name: Test

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: '0 12 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }}, ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        toolchain:
          - msrv
          - stable
          - beta
          - nightly
        include:
          - os: macos-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        if: matrix.toolchain != 'msrv'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Determine minimum supported Rust version
        if: matrix.toolchain == 'msrv'
        id: msrv
        run: |
          rust_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].rust_version')"
          echo "msrv=$rust_version" >> "$GITHUB_OUTPUT"

      - name: Install minimum supported Rust version
        if: matrix.toolchain == 'msrv'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: Activate cache
        if: "!startsWith(github.head_ref, 'renovate/')"
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-hack
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2
        with:
          tool: cargo-hack

      - name: Build crate
        run: cargo hack --feature-powerset build --all-targets --verbose

      - name: Test crate
        run: cargo hack --feature-powerset test --bins --verbose

  minimal-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install nightly Rust
        # Needed by cargo-minimal-versions
        run: rustup update nightly

      - name: Activate cache
        if: "!startsWith(github.head_ref, 'renovate/')"
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-hack and cargo-minimal-versions
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2
        with:
          tool: cargo-hack,cargo-minimal-versions

      - name: Build crate
        run: cargo minimal-versions --direct --feature-powerset build --all-targets --verbose

      - name: Test crate
        run: cargo minimal-versions --direct --feature-powerset test --bins --verbose

  coverage:
    # This is separate from the main tests because cargo-llvm-cov doesn't run
    # doctests.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: llvm-tools

      - name: Activate cache
        if: "!startsWith(github.head_ref, 'renovate/')"
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2
        with:
          tool: cargo-llvm-cov

      - name: Test with coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Activate cache
        if: "!startsWith(github.head_ref, 'renovate/')"
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-hack
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2
        with:
          tool: cargo-hack

      - name: Check code
        run: cargo hack --workspace --feature-powerset clippy -- -Dwarnings

      - name: Check tests & examples
        run: cargo hack --workspace --feature-powerset clippy --tests --examples -- -Dwarnings

      - name: Check formatting
        run: cargo fmt --all --check

  deny:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run `cargo deny check`
        uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2

  thirdparty:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # This is necessary as of 2025-02-23 because cargo seems to have changed
      # its algorithm for the digest in registry paths in 1.85, yet GitHub
      # Actions uses an older version of rust by default, leading to mismatches
      # for crates like `ring` that don't specify "license" metadata.
      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install cargo-bundle-licenses
        uses: taiki-e/cache-cargo-install-action@417450f3c33ee20393705369577571770643d4c7 # v3
        with:
          tool: cargo-bundle-licenses
          locked: false  # Ensure we get the latest version of the spdx crate

      - name: Check that third party licenses haven't changed
        run: |
          cargo bundle-licenses --check-previous \
            -f toml -o CI.toml -p THIRDPARTY.toml

